#
# Cross-namespace flow demo using Kubernetes e2e agnhost.
#
# Prerequisite: image on every kind node (pick one approach).
#
# A) Host Docker, then load (when kind load works):
#   docker pull registry.k8s.io/e2e-test-images/agnhost:2.45
#   kind load docker-image registry.k8s.io/e2e-test-images/agnhost:2.45 --name kind
#
# B) If `kind load` fails with ctr digest errors, pull into each node's containerd:
#   for n in kind-control-plane kind-worker kind-worker2; do
#     docker exec "$n" crictl pull registry.k8s.io/e2e-test-images/agnhost:2.45
#   done
#
---
apiVersion: v1
kind: Namespace
metadata:
  name: flow-demo-a
---
apiVersion: v1
kind: Namespace
metadata:
  name: flow-demo-b
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agnhost-server
  namespace: flow-demo-a
  labels:
    app: agnhost-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agnhost-server
  template:
    metadata:
      labels:
        app: agnhost-server
    spec:
      containers:
        - name: agnhost
          image: registry.k8s.io/e2e-test-images/agnhost:2.45
          imagePullPolicy: IfNotPresent
          command: ["/agnhost", "netexec", "--http-port", "8080"]
          ports:
            - containerPort: 8080
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: agnhost-server
  namespace: flow-demo-a
spec:
  selector:
    app: agnhost-server
  ports:
    - port: 8080
      targetPort: http
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agnhost-client
  namespace: flow-demo-b
  labels:
    app: agnhost-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agnhost-client
  template:
    metadata:
      labels:
        app: agnhost-client
    spec:
      containers:
        - name: client
          image: registry.k8s.io/e2e-test-images/agnhost:2.45
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              URL="http://agnhost-server.flow-demo-a.svc.cluster.local:8080/"
              echo "Waiting for server in flow-demo-a..."
              until wget -qO- "$URL" >/dev/null 2>&1; do sleep 1; done
              echo "Cross-namespace HTTP GET every 5s -> $URL"
              while true; do
                wget -qO- "$URL" >/dev/null
                sleep 5
              done
---
# ACNP that allows egress from flow-demo-b to flow-demo-a server.
apiVersion: crd.antrea.io/v1beta1
kind: ClusterNetworkPolicy
metadata:
  name: allow-flow-demo-b-to-flow-demo-a
spec:
  priority: 200
  tier: application
  appliedTo:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: flow-demo-b
  egress:
    - action: Allow
      name: allow-to-flow-demo-a
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: flow-demo-a
      ports:
        - protocol: TCP
          port: 8080
